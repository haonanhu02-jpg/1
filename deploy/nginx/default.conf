server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    gzip on;
    gzip_static on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml text/javascript image/svg+xml;

    location = / {
        return 302 /tools/;
    }

    location = /tools {
        return 301 /tools/;
    }

    location /tools/ {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /tools/index.html;
    }

    location /api/ {
        proxy_pass http://iyque-backend:8085/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 150s;
    }

    location = /api {
        proxy_pass http://iyque-backend:8085;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 150s;
    }

    location /iycallback/ {
        proxy_pass http://iyque-backend:8085/iycallback/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 150s;
    }
}
